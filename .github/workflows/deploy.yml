name: Auto-Déploiement Git

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Déployer depuis Git
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      
      - name: Déployer via Git
        run: |
          echo "Déploiement en cours..."
          # Utiliser un webhook ou script SSH pour déployer
          curl -X POST ${{ secrets.WEBHOOK_URL }} \
            -H "Content-Type: application/json" \
            -d "{\"ref\":\"${{ github.ref }}\",\"commit\":\"${{ github.sha }}\"}"
        
      - name: Notifications
        if: always()
        run: echo "Déploiement terminé - Commit: ${{ github.sha }}"
